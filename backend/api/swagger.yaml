basePath: /
definitions:
  entity.Tag:
    properties:
      confidence:
        type: number
      label:
        type: string
    type: object
  handler.AnalyzeResponse:
    properties:
      tags:
        items:
          $ref: '#/definitions/entity.Tag'
        type: array
    type: object
  handler.ErrorResponse:
    properties:
      code:
        type: string
      message:
        type: string
    type: object
info:
  contact: {}
  description: API para analizar imagenes usando un proveedor de IA.
  title: AI Image Analyzer API
  version: "1.0"
paths:
  /api/analyze:
    post:
      consumes:
      - multipart/form-data
      description: Recibe una imagen y devuelve etiquetas de contenido con su confianza.
      parameters:
      - description: Archivo de imagen
        in: formData
        name: image
        required: true
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.AnalyzeResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "413":
          description: Request Entity Too Large
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "415":
          description: Unsupported Media Type
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "502":
          description: Bad Gateway
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "504":
          description: Gateway Timeout
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      summary: Analizar imagen
      tags:
      - analyze
swagger: "2.0"
