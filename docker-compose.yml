version: "3.9"

services:
  backend:
    build:
      context: ./backend
    container_name: ai-image-analyzer-backend
    environment:
      PORT: 8080
      IA_API_KEY: ${IA_API_KEY:-}
      IA_API_URL: ${IA_API_URL:-}
      MAX_IMAGE_SIZE: ${MAX_IMAGE_SIZE:-5242880}
    ports:
      - "8080:8080"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: ai-image-analyzer-frontend
    depends_on:
      - backend
    ports:
      - "3000:80"
    restart: unless-stopped
