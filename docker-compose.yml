services:
  backend:
    build:
      context: ./backend
    container_name: ai-image-analyzer-backend
    env_file:
      - ./backend/.env
    environment:
      MAX_IMAGE_SIZE: ${MAX_IMAGE_SIZE:-5242880}
      PORT: ${PORT:-8080}
    ports:
      - "8080:8080"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: ai-image-analyzer-frontend
    depends_on:
      - backend
    ports:
      - "3000:80"
    restart: unless-stopped
